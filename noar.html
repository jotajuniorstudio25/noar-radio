<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>No Ar - Rádio Serenata</title>
<style>
body{margin:0;background:#111;font-family:Arial,sans-serif}
.card{max-width:420px;margin:20px auto;background:#1d1d1d;border:2px solid #d4af37;border-radius:18px;padding:24px;color:#fff;text-align:center;box-shadow:0 0 20px rgba(212,175,55,.25)}
.live{display:inline-block;background:#d40000;padding:6px 14px;border-radius:20px;font-weight:bold;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.45}}
img{width:140px;height:140px;border-radius:50%;object-fit:cover;border:4px solid #d4af37;margin:18px 0}
h1{margin:0;color:#f2c94c;font-size:30px}
h2{margin:10px 0;font-size:22px;font-weight:normal}
p{color:#ccc}
a{display:inline-block;margin-top:18px;background:#d4af37;color:#111;text-decoration:none;padding:12px 22px;border-radius:30px;font-weight:bold}
</style></head><body>
<div class="card">
<div class="live">🔴 AO VIVO</div>
<img id="foto" src="https://placehold.co/140x140?text=Radio">
<h1 id="prog"></h1>
<h2 id="loc"></h2>
<p id="hora"></p>
<a href="https://server11.srvsh.com.br:6736/stream" target="_blank">▶ Ouvir Agora</a>
</div>
<script>
const grade=[
{ini:0,fim:6,p:"Madrugada Show",l:"Rádio Serenata",f:"https://placehold.co/140x140?text=Radio"},
{ini:6,fim:10,p:"Show da Manhã",l:"André Martins",f:"https://placehold.co/140x140?text=Andre"},
{ini:10,fim:12,p:"Seleção Musical",l:"Jota Júnior",f:"https://placehold.co/140x140?text=Jota"},
{ini:12,fim:15,p:"Flashback",l:"Carla Mendes",f:"https://placehold.co/140x140?text=Carla"},
{ini:15,fim:18,p:"Seleção Musical 2",l:"Jota Júnior",f:"https://placehold.co/140x140?text=Jota"},
{ini:18,fim:21,p:"Show da Noite",l:"Ednaldo Lima",f:"https://placehold.co/140x140?text=Ednaldo"},
{ini:21,fim:22,p:"Gospel Hits",l:"Roberta Sousa",f:"https://placehold.co/140x140?text=Roberta"},
{ini:22,fim:24,p:"Love Night",l:"Josué Silva",f:"https://placehold.co/140x140?text=Josue"}
];
function atualiza(){
 const h=new Date().getHours();
 const x=grade.find(g=>h>=g.ini&&h<g.fim);
 prog.textContent=x.p;
 loc.textContent="🎙 "+x.l;
 hora.textContent=`${String(x.ini).padStart(2,'0')}:00 às ${String(x.fim).padStart(2,'0')}:00`;
 foto.src=x.f;
}
atualiza();setInterval(atualiza,60000);
</script></body></html>
